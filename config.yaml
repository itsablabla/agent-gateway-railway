# yaml-language-server: $schema=https://agentgateway.dev/schema/config
config:
  enableIpv6: false
  adminAddr: 127.0.0.1:15000
  statsAddr: 127.0.0.1:15020
  readinessAddr: 127.0.0.1:15021
binds:
- port: 3000
  listeners:
  - routes:
    # 0. Health Check
    - name: health-check
      matches:
      - path:
          exact: /
      policies:
        directResponse:
          status: 200
          body: "Agent Gateway is running"

    # 1. MCP Tool Layer — protected by GARZA OS master API key
    # Auth: Authorization: Bearer garza-gw-V3JVUiLSPy6k1zNgSCn6UZck5emKmqcPxJ193IYMUn8
    - name: mcp-tools
      matches:
      - path:
          pathPrefix: /mcp
      policies:
        cors:
          allowOrigins:
          - "*"
          allowHeaders:
          - mcp-protocol-version
          - content-type
          - cache-control
          - authorization
          - x-api-key
          - accept
          exposeHeaders:
          - "Mcp-Session-Id"
        apiKey:
          mode: strict
          keys:
          - key: "garza-gw-V3JVUiLSPy6k1zNgSCn6UZck5emKmqcPxJ193IYMUn8"
        # Strip the gateway API key from upstream requests so backends don't see it
        requestHeaderModifier:
          remove:
          - authorization
      backends:
      - mcp:
          targets:
          - name: bitwarden
            mcp:
              host: https://bitwarden-mcp-server-production.up.railway.app/mcp?apikey=garza-bw-mcp-2026
          - name: arcade
            mcp:
              host: https://api.arcade.dev/mcp/gw_3Ab44vv0XtJvS1aGggZrUfyv5kH
            policies:
              requestHeaderModifier:
                set:
                  Authorization: "Bearer arc_proj1DeCRvyUd7d3YTPiJBddokA6hGHbyRdVT2CGC2kCxj3yK5Yg5g4"
          - name: rube
            mcp:
              host: https://rube.app/mcp
          - name: fastio
            mcp:
              host: https://mcp.fast.io/mcp

    # 2. Agent Registry (Direct Response — public, no auth required)
    - name: agent-registry
      matches:
      - path:
          exact: /registry
      policies:
        cors:
          allowOrigins:
          - "*"
        directResponse:
          status: 200
          body: >
            {
              "version": "1.0",
              "gateway": "https://agentgateway.garza-os.com",
              "agents": [
                {
                  "name": "researcher",
                  "description": "Deep research and analysis agent",
                  "endpoint": "https://agentgateway.garza-os.com/agents/researcher",
                  "protocol": "a2a"
                },
                {
                  "name": "coder",
                  "description": "Software development and debugging agent",
                  "endpoint": "https://agentgateway.garza-os.com/agents/coder",
                  "protocol": "a2a"
                },
                {
                  "name": "manus",
                  "description": "Autonomous general AI agent (GARZA OS primary)",
                  "endpoint": "https://agentgateway.garza-os.com/agents/manus",
                  "protocol": "a2a"
                }
              ],
              "mcp": {
                "endpoint": "https://agentgateway.garza-os.com/mcp",
                "auth": "Authorization: Bearer garza-gw-V3JVUiLSPy6k1zNgSCn6UZck5emKmqcPxJ193IYMUn8",
                "tools": ["bitwarden", "arcade", "rube", "fastio"]
              }
            }

    # 3. A2A Agent Routes
    - name: a2a-researcher
      matches:
      - path:
          pathPrefix: /agents/researcher
      policies:
        a2a: {}
      backends:
      - host: researcher-agent-production.up.railway.app:443

    - name: a2a-coder
      matches:
      - path:
          pathPrefix: /agents/coder
      policies:
        a2a: {}
      backends:
      - host: coder-agent-production.up.railway.app:443
