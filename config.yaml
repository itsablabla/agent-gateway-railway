# yaml-language-server: $schema=https://agentgateway.dev/schema/config
config:
  adminAddr: 127.0.0.1:15000
  statsAddr: 127.0.0.1:15020
  readinessAddr: 127.0.0.1:15021
binds:
- port: 3000
  listeners:
  - routes:
    # 1. MCP Tool Layer
    - name: mcp-tools
      matches:
      - path:
          pathPrefix: /mcp
      policies:
        cors:
          allowOrigins:
          - "*"
          allowHeaders:
          - mcp-protocol-version
          - content-type
          - cache-control
          - authorization
          exposeHeaders:
          - "Mcp-Session-Id"
      backends:
      - mcp:
          targets:
          - name: bitwarden
            mcp:
              host: https://bitwarden-mcp-server-production.up.railway.app/mcp?apikey=garza-bw-mcp-2026
          - name: arcade
            mcp:
              host: https://api.arcade.dev/mcp/gw_3Ab44vv0XtJvS1aGggZrUfyv5kH
          - name: rube
            mcp:
              host: https://rube.app/mcp
          - name: fastio
            mcp:
              host: https://mcp.fast.io/mcp

    # 2. Agent Registry (Direct Response)
    - name: agent-registry
      matches:
      - path:
          exact: /registry
      policies:
        cors:
          allowOrigins:
          - "*"
        directResponse:
          status: 200
          body: >
            {
              "agents": [
                {
                  "name": "researcher",
                  "description": "Deep research and analysis agent",
                  "endpoint": "https://agentgateway.garza-os.com/agents/researcher"
                },
                {
                  "name": "coder",
                  "description": "Software development and debugging agent",
                  "endpoint": "https://agentgateway.garza-os.com/agents/coder"
                }
              ]
            }

    # 3. A2A Routing (Example for a Researcher Agent)
    - name: a2a-researcher
      matches:
      - path:
          pathPrefix: /agents/researcher
      policies:
        a2a: {}
        urlRewrite:
          path:
            prefix: /
      backends:
      - host: researcher-agent-production.up.railway.app:443
