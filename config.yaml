# yaml-language-server: $schema=https://agentgateway.dev/schema/config
config:
  enableIpv6: false
  adminAddr: 127.0.0.1:15000
  statsAddr: 127.0.0.1:15020
  readinessAddr: 127.0.0.1:15021
binds:
- port: 3000
  listeners:
  - routes:
    # 1. MCP Tool Layer — protected by GARZA OS master API key
    # Auth: Authorization: Bearer 4541124ec411620fced0880017594e16e41008269433ae34
    - name: mcp-tools
      matches:
      - path:
          pathPrefix: /mcp
      policies:
        cors:
          allowOrigins:
          - "*"
          allowHeaders:
          - mcp-protocol-version
          - mcp-session-id
          - content-type
          - cache-control
          - authorization
          - x-api-key
          - accept
          exposeHeaders:
          - "Mcp-Session-Id"
          - "Mcp-Protocol-Version"
          maxAge: "3600"
        apiKey:
          mode: strict
          keys:
          - key: "4541124ec411620fced0880017594e16e41008269433ae34"
        requestHeaderModifier:
          remove:
          - authorization
        localRateLimit:
        - maxTokens: 100
          tokensPerFill: 100
          fillInterval: 1m
          type: requests
      backends:
      - mcp:
          stateful: true
          targets:
          - name: protonmail
            mcp:
              host: http://127.0.0.1:8101/mcp
          - name: vault
            mcp:
              host: http://127.0.0.1:8334/mcp
          - name: mattermost
            mcp:
              host: http://127.0.0.1:8900/mcp
          - name: beeper
            openAPI:
              host: http://127.0.0.1:8400
          - name: gwmanager
            mcp:
              host: http://127.0.0.1:8800/mcp
          - name: railway
            mcp:
              host: http://127.0.0.1:8850/mcp
          - name: hyperbrowser
            mcp:
              host: https://hyperbrowser-mcp-server-production.up.railway.app/mcp
