# yaml-language-server: $schema=https://agentgateway.dev/schema/config
binds:
- port: 3000
  listeners:
  - routes:
    - name: mcp-route
      matches:
      - path:
          pathPrefix: /mcp
      policies:
        cors:
          allowOrigins:
          - "*"
          allowHeaders:
          - mcp-protocol-version
          - content-type
          - cache-control
          - authorization
          exposeHeaders:
          - "Mcp-Session-Id"
      backends:
      - mcp:
          targets:
          - name: bitwarden
            mcp:
              host: https://bitwarden-mcp-server-production.up.railway.app/mcp?apikey=garza-bw-mcp-2026
          - name: arcade
            mcp:
              host: https://api.arcade.dev/mcp/gw_3Ab44vv0XtJvS1aGggZrUfyv5kH
          - name: rube
            mcp:
              host: https://rube.app/mcp
          - name: fastio
            mcp:
              host: https://mcp.fast.io/mcp
